spring:
  datasource:
    url: jdbc:mysql://localhost:8889/dental_clinic
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
